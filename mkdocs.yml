site_name: Interpretador de C - Compiladores 1 - Equipe 16
site_url: https://comp1-16.github.io/COMP-16/
repo_url: https://github.com/COMP1-16/COMP-16
repo_name: COMP-16

docs_dir: manual
site_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Mudar para tema escuro
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Mudar para tema claro
  features:
    - navigation.top
    - search.highlight
    - search.share

nav:
  - Início: index.md
  - Linguagem e Escopo:
      - Visão geral: interpretador/linguagem-e-escopo.md
      - Linguagem interpretada: interpretador/linguagemInterpretada.md
      - Escopo: interpretador/escopo.md
  - Estrutura do interpretador: interpretador/estrutura.md
  - Como executar o interpretador: interpretador/comoExecutar.md
  - Casos de teste: interpretador/casosTeste.md
  - Pontos de controle:
      - Visão geral: interpretador/pontosDeControle.md
      - PC1: interpretador/pontosDeControlePc1.md
      - PC2: interpretador/pontosDeControlePc2.md
      - Entrega final: interpretador/pontosDeControleEntregaFinal.md
  - Uso de IA: interpretador/usoDeIA.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables